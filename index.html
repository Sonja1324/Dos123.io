<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Достопримечательности Великого Новгорода</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #e2f7cf;  /* салатовый фон */
            font-family: 'Inter', sans-serif;
            color: #1e1e1e;
            line-height: 1.45;
            padding: 2rem 1rem;
        }

        /* главный контейнер */
        .container {
            max-width: 1280px;
            margin: 0 auto;
            background-color: #0c1e0c;
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.4);
            overflow: hidden;
            padding: 2rem 1.5rem;
        }

        /* шапка */
        .hero {
            text-align: center;
            margin-bottom: 3rem;
            border-bottom: 2px solid #5fad41;
            padding-bottom: 1.8rem;
        }

        .hero h1 {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #d2ffb0, #7bcb4a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .hero p {
            font-size: 1.2rem;
            color: #b3e0a0;
            max-width: 680px;
            margin: 0.5rem auto 0;
        }

        /* сетка карточек 2x5 (адаптивно) */
        .sights-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }

        /* карточка */
        .sight-card {
            background-color: #101f0e;
            border-radius: 1.8rem;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 12px 18px -8px rgba(0, 0, 0, 0.5);
            transition: transform 0.2s ease, box-shadow 0.2s;
            border-left: 5px solid #7bcb4a;
            height: 100%;
        }

        .sight-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 22px 28px -12px black;
        }

        .card-media {
            width: 100%;
            height: 200px;
            overflow: hidden;
            background-color: #1e2a1a;
        }

        .card-media img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
            display: block;
        }

        .sight-card:hover .card-media img {
            transform: scale(1.03);
        }

        .card-content {
            padding: 1.5rem;
            background-color: #0c140b;
            color: #eef5e8;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .card-content h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #c2f0a4;
            margin-bottom: 0.6rem;
            border-left: 4px solid #7bcb4a;
            padding-left: 0.8rem;
        }

        .short-info {
            font-size: 0.8rem;
            color: #96b785;
            margin-bottom: 1rem;
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .short-info span {
            background: #1e2a18;
            padding: 0.2rem 0.7rem;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .card-content p {
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 1.2rem;
            color: #e2e9dc;
            flex: 1;
        }

        /* кнопка на карточке */
        .detail-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: #2d4a22;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            color: #eaffd4;
            font-weight: 600;
            text-decoration: none;
            font-size: 0.85rem;
            transition: all 0.2s;
            border: 1px solid #5fad41;
            cursor: pointer;
            width: fit-content;
        }

        .detail-btn:hover {
            background: #7bcb4a;
            color: #0a1f05;
            border-color: #c6ff9b;
            box-shadow: 0 4px 12px rgba(123, 203, 74, 0.3);
        }

        footer {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.8rem;
            color: #90b47a;
            border-top: 1px solid #2a4222;
            padding-top: 1.8rem;
        }

        @media (max-width: 700px) {
            .container {
                padding: 1rem;
            }
            .hero h1 {
                font-size: 2rem;
            }
            .sights-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

    </div>

    <footer>

    // функция генерации главной страницы (карточки)
    function renderCards() {
        const grid = document.getElementById('cardsGrid');
        if (!grid) return;
        grid.innerHTML = '';
        sights.forEach(sight => {
            const card = document.createElement('div');
            card.className = 'sight-card';
            card.innerHTML = `
                <div class="card-media">
                    <img src="${sight.mainImg}" alt="${sight.name}">
                </div>
                <div class="card-content">
                    <h2>${sight.name}</h2>
                    <div class="short-info">
                        ${sight.tags.map(tag => `<span>${tag}</span>`).join('')}
                    </div>
                    <p>${sight.shortDesc}</p>
                    <button class="detail-btn" data-id="${sight.id}">🔍 Описание →</button>
                </div>
            `;
            grid.appendChild(card);
        });

        // добавляем обработчики на кнопки (переход на страницу достопримечательности)
        document.querySelectorAll('.detail-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.getAttribute('data-id'));
                openSightPage(id);
            });
        });
    }

    // ФУНКЦИЯ СОЗДАНИЯ СТРАНИЦЫ С КАРУСЕЛЬЮ (динамически)
    function openSightPage(sightId) {
        const sight = sights.find(s => s.id === sightId);
        if (!sight) return;

        // создаем модальное окно (новую страницу по сути, но в том же окне)
        // мы создадим div на весь экран с каруселью, перекрывающий всё, как отдельную страницу.
        const overlay = document.createElement('div');
        overlay.id = 'sightModal';
        overlay.style.cssText = `
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #0a1308;
            z-index: 10000;
            overflow-y: auto;
            font-family: 'Inter', sans-serif;
            padding: 1.5rem;
            backdrop-filter: blur(2px);
        `;

        // внутренняя структура
        overlay.innerHTML = `
            <div style="max-width: 1200px; margin: 1rem auto; background: #0c1a0a; border-radius: 2rem; padding: 1.5rem; border: 1px solid #5fad41; position: relative;">
                <button id="closeModalBtn" style="position: absolute; top: 1rem; right: 1.5rem; background: #2d4a22; border: none; font-size: 1.8rem; cursor: pointer; color: #eaffd4; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.2s; z-index: 20;">✕</button>
                <h1 style="font-size: 2.3rem; font-weight: 800; color: #c2f0a4; text-align: center; margin: 0.5rem 0 1rem 0; border-left: none; padding-left: 0;">${sight.name}</h1>
                
                <!-- КАРУСЕЛЬ -->
                <div style="position: relative; width: 100%; margin: 1.5rem 0; border-radius: 1.8rem; overflow: hidden; background: #101f0e;">
                    <div id="carouselContainer" style="position: relative; width: 100%; aspect-ratio: 16 / 9; background: #1e2a1a;">
                        <img id="carouselImage" src="${sight.gallery[0]}" alt="Фото" style="width: 100%; height: 100%; object-fit: cover; display: block;">
                        <!-- полупрозрачные кнопки -->
                        <button id="prevBtn" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); border: none; font-size: 2.5rem; cursor: pointer; color: #eaffd4; width: 48px; height: 48px; border-radius: 60px; display: flex; align-items: center; justify-content: center; transition: 0.2s; font-weight: bold;">‹</button>
                        <button id="nextBtn" style="position: absolute; right: 16px; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); border: none; font-size: 2.5rem; cursor: pointer; color: #eaffd4; width: 48px; height: 48px; border-radius: 60px; display: flex; align-items: center; justify-content: center; transition: 0.2s; font-weight: bold;">›</button>
                    </div>
                    <div style="display: flex; justify-content: center; gap: 0.8rem; margin-top: 1rem; padding-bottom: 1rem;" id="dotsContainer"></div>
                </div>

                <!-- ОПИСАНИЕ ПОД КАРУСЕЛЬЮ -->
                <div style="background: #0f1a0c; border-radius: 1.5rem; padding: 1.8rem; margin-top: 0.8rem; border-left: 5px solid #7bcb4a;">
                    <p style="font-size: 1.1rem; line-height: 1.6; color: #eef5e8;">${sight.description}</p>
                </div>
                <div style="margin-top: 1.5rem; text-align: center;">
                    <button id="backToMainBtn" style="background: #2d4a22; border: none; padding: 0.7rem 2rem; border-radius: 60px; color: #eaffd4; font-weight: 600; cursor: pointer; border: 1px solid #5fad41;">← вернуться к списку</button>
                </div>
            </div>
        `;

        document.body.appendChild(overlay);
        document.body.style.overflow = 'hidden'; // запрещаем скролл фона

        let currentIndex = 0;
        const galleryImages = sight.gallery;
        const carouselImg = document.getElementById('carouselImage');
        const prevButton = document.getElementById('prevBtn');
        const nextButton = document.getElementById('nextBtn');
        const dotsContainer = document.getElementById('dotsContainer');

        function updateCarousel() {
            if (carouselImg) {
                carouselImg.src = galleryImages[currentIndex];
            }
            updateDots();
        }

        function updateDots() {
            if (!dotsContainer) return;
            dotsContainer.innerHTML = '';
            galleryImages.forEach((_, idx) => {
                const dot = document.createElement('span');
                dot.style.cssText = `
                    width: 10px;
                    height: 10px;
                    border-radius: 50%;
                    background: ${idx === currentIndex ? '#7bcb4a' : '#3e5a34'};
                    margin: 0 5px;
                    cursor: pointer;
                    transition: 0.2s;
                    display: inline-block;
                `;
                dot.addEventListener('click', () => {
                    currentIndex = idx;
                    updateCarousel();
                });
                dotsContainer.appendChild(dot);
            });
        }

        if (prevButton) {
            prevButton.addEventListener('click', () => {
                currentIndex = (currentIndex - 1 + galleryImages.length) % galleryImages.length;
                updateCarousel();
            });
        }
        if (nextButton) {
            nextButton.addEventListener('click', () => {
                currentIndex = (currentIndex + 1) % galleryImages.length;
                updateCarousel();
            });
        }

        // клавиши влево/вправо
        function handleKeydown(e) {
            if (e.key === 'ArrowLeft') {
                currentIndex = (currentIndex - 1 + galleryImages.length) % galleryImages.length;
                updateCarousel();
            } else if (e.key === 'ArrowRight') {
                currentIndex = (currentIndex + 1) % galleryImages.length;
                updateCarousel();
            } else if (e.key === 'Escape') {
                closeModal();
            }
        }
        window.addEventListener('keydown', handleKeydown);

        function closeModal() {
            if (overlay && overlay.parentNode) overlay.remove();
            document.body.style.overflow = '';
            window.removeEventListener('keydown', handleKeydown);
        }

        const closeBtn = document.getElementById('closeModalBtn');
        if (closeBtn) closeBtn.addEventListener('click', closeModal);
        const backBtn = document.getElementById('backToMainBtn');
        if (backBtn) backBtn.addEventListener('click', closeModal);

        // инициализация точек и первого изображения
        updateCarousel();
    }

    // запускаем рендер карточек
    renderCards();
</script>
</body>
</html>
